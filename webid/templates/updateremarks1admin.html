

{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="container-fluid py-3">
    <div class="container">
    <form action="updaterecordadmin/{{ mymember.id }}" method="post">
    
    <div class="row">
    
        {% csrf_token %}
        <div class="col-md-12 shadow checkoutform">
            <div class="card-body">
                <h6>Add Remarks</h6>
                <hr>
                <div class="row">
                    <div class="col-md-6 mt-2">
                        <label>First Name</label>
                        <input type="text" required value="{{ mymember.first_name }}"class="form-control" name="fname" placeholder="Enter Fist Name" disabled>
                    </div>
                    <div class="col-md-6 mt-2">
                        <label>Last Name</label>
                        <input type="text" required value="{{ mymember.last_name }}"class="form-control" name="lname" placeholder="Enter Last Name" disabled>
                    </div>
                    <div class="col-md-6 mt-2">
                        <label>Remarks</label>
                        <input type="text" required value="{{ mymember.remarks }}"class="form-control" name="remarks" placeholder="Enter Remarks">
                    </div>
                    
                    <div class="mt-2">
                                
                        <button type="submit" class="btn btn-primary">Update</button>
                    </div>


                </div>  
                
            </div>
        </div> 


    </div>

    </div>
    </form>

</div>




{% endblock %}
