<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Push Notifications</title>
</head>
<body>
    <h1>Firebase Push Notifications</h1>

    <!-- Firebase SDK with ES6 modules -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
      import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-messaging.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBUef15crXKCD2AhIhSceQajbFBkEA2urg",
        authDomain: "push-notification-a806b.firebaseapp.com",
        projectId: "push-notification-a806b",
        storageBucket: "push-notification-a806b.appspot.com",
        messagingSenderId: "329285620602",
        appId: "1:329285620602:web:60789ccd0416a3aea73cc3",
        measurementId: "G-CQN7258F0V"
      };

      const app = initializeApp(firebaseConfig);
      const messaging = getMessaging(app);

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('firebase-messaging-sw.js')
        .then((registration) => {
          console.log('Service Worker registered with scope:', registration.scope);

          // Use the registered service worker with Firebase
          messaging.useServiceWorker(registration);

          // Request permission and get token
          return getToken(messaging, { vapidKey: 'CErk_bukW87opYOyVQt_EnCQhTtDxuWtwrtnifTThmM' });
        })
        .then((currentToken) => {
          if (currentToken) {
            console.log('FCM Token:', currentToken);
            // Send token to server, etc.
          } else {
            console.log('No registration token available.');
          }
        })
        .catch((err) => {
          console.log('An error occurred while retrieving token. ', err);
        });
      }
    </script>
</body>
</html>
