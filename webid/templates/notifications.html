
{% extends 'base.html' %}
{% load static %}
{% block content %}

<script>
  $(document).on("click", ".open-preview_modal", function (e) {
    e.preventDefault();
    var $preview_modal = $("#preview_modal");
    var popup_url = $(this).data("popup-url");

    $(".modal-body", $preview_modal).load(popup_url, function () {
      $preview_modal.modal("show");
      
      /*$(".modal-backdrop").remove();-->*/
    $("#btnClosePopup").click(function () {
            $("#preview_modal").modal("hide");
        });
    });
  });


    

</script>

<div id="preview_modal" class="modal fade" role="dialog">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-body"></div>
      <div class="modal-footer">
        <button id ="btnClosePopup" type="button" class="btn btn-primary close" data-dismiss="modal" target="_blank" aria-label="Close">Close
        </button>
      </div>
    </div>
  </div>
</div>




<!-- Modal -->

<div class="modal fade" id="preview_modal" tabindex="-1" aria-labelledby="exampleModalLabel" presentationStyle="fullScreen"aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLabel">Modal title</h5>
        <button type="button" id ="btnClosePopup"class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body" id="modal-body">
      <div>
    
    </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary">Save changes</button>
      </div>
    </div>
  </div>
</div>





<div class="container-fluid py-3">



    <div class="container">

    

    
        <div class="row">

            

        <div class ="card-header">
        
            <h2 class="mb-0 d-flex justify-content-left">Notifications</h2>
            <form  action="{% url 'searchletter' %}" method=POST>
                {% csrf_token %}
            <div class="input-group d-flex justify-content-end">
            
                <div class="form-outline">
                    <input type="text"  name="searched" class="form-control" />
                     
                
                </div>
                <button id="search-button" type="submit" class="btn btn-primary">
                <i class="fas fa-search"></i>
                </button>
            
            </div>
            </form>
        </div>
    
        {% csrf_token %}
            <div class="col-md-12 shadow checkoutform">

                <div class="card-body">
                <div class ="table-responsive">
                    <table class="table table-bordered">
                        <thead>
                            <tr>
                                <th>Letter Description</th>
                                <th>Message</th>
                                <th>Date Updated</th>
                              
                                <th>Action</th>
                                
                            
                            </tr>
                        </thead>
                        <tbody>
                            
                            {% for item in result %}
                            
                            <tr>
                                <td>{{item.letter_desc}}</td>
                                <td>{{item.message}}</td>
                                <td>{{item.created_at}}</td>
                               
                                 <td><a href="notificationread/{{item.id}}/{{item.id2}}"class="btn btn-primary mt-2">View</a></td>
                                </td>
                                 
                            
                              
                            </tr>

                                {% endfor %}
                                
                              
                              


                        </tbody>
                    </table>
                </div>
                
                
                </div>
            </div> 

        

        </div>

    </div>





</div>
{% endblock %}
